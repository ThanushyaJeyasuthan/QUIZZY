<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZZY - Quiz</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
   
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
   
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/quiz.css">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
    <nav class="navbar navbar-expand-lg  border-bottom sticky-top" >
        <div class="container text-light">
                <div class="logo me-3">💡</div> <b >QUIZZY</b>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav fs-5 fw-medium">
                    <li class="nav-item">
                        <a class="nav-link active text-light"  href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-secondary hover-primary text-light" href="category.html">Category</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-secondary hover-primary text-light" href="results.html">Results</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
   
   
    <main class="flex-grow-1 d-flex flex-column py-4">
        <div class="container quiz-container flex-grow-1 d-flex flex-column justify-content-center">
            <div class="row justify-content-center">
                <div class="col-lg-8">

                   
                    <div class="d-flex justify-content-between align-items-end mb-3">
                        <span class="fw-bold text-secondary fs-5" id="questionCount">Question 1/10</span>
                        <div
                            class="bg-white border text-dark fw-bold px-3 py-1 rounded shadow-sm d-flex align-items-center gap-2">
                            <i class="fa-regular fa-clock"></i> <span id="timerDisplay">01:30</span>
                        </div>
                    </div>
                    <div class="progress mb-4" style="height: 10px;">
                        <div id="progressBar" class="progress-bar bg-success" role="progressbar" style="width: 10%;"
                            aria-valuenow="10" aria-valuemin="0" aria-valuemax="100"></div>
                    </div>

                    
                    <div class="card shadow border-0 rounded-4  mb-4 position-relative overflow-hidden" style="background-color: rgb(160, 202, 188);">
                    
                        

                        <div class="card-body p-4 p-md-5">
                          
                            <div id="feedbackAlert" class="alert d-none mb-4 fw-bold" role="alert">
                              
                            </div>

                          <div class="card-body p-0"> <div id="questionHeader" class="p-4 p-md-5 text-center mb-0" style="background-color: #0a192f; border-radius: 16px 16px 0 0;">
        <h4 id="questionText" class="mb-0 fw-bold text-white lh-base">Loading question...</h4>
    </div>

    <div class="p-4 p-md-5 bg-white" style="border-radius: 0 0 16px 16px;">
        <div id="feedbackAlert" class="alert d-none mb-4 fw-bold" role="alert"></div>
        
        <div class="row g-3" id="optionsContainer">
            </div>
    </div>
</div>
                        </div>
                    </div>

                
                    <div class="d-flex justify-content-between align-items-center">
                        <button id="skipBtn"
                            class="btn px-4 rounded-pill fw-bold transition-all bg-white shadow-sm">Skip</button>
                        <button id="nextBtn" class="btn btn-dark px-5 rounded-pill fw-bold transition-all shadow-sm"
                            disabled>Next</button>
                    </div>

                </div>
            </div>
        </div>
    </main>

     <footer class="py-3 mt-auto border-top " >
        <div class="container text-center ">
            <small class="fw-medium text-light ">Created By Thanushya Jeyasuthan © 2026. All rights reserved.</small>
        </div>
    </footer>


  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
    <script src="js/main.js"></script>
    <script src="js/quiz.js"></script>
</body>

</html>
