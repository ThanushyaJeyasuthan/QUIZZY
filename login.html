<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZZY - Login/Register</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
    <nav class="navbar navbar-expand-lg  border-bottom sticky-top" >
        <div class="container text-light">
                <div class="logo me-3">💡</div> <b >QUIZZY</b>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav fs-5 fw-medium">
                    <li class="nav-item">
                        <a class="nav-link active text-light"  href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-secondary hover-primary text-light" href="category.html">Category</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-secondary hover-primary text-light" href="results.html">Results</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>




    
    <main class="flex-grow-1 d-flex align-items-center py-4">
        <div class="container pb-5" >
            <div class="row g-4 justify-content-center" >
                
                <div class="col-md-6 col-lg-5" >
                    <div class="card shadow-sm border border-light-subtle rounded-4 h-100 "style="background-color: rgb(132, 205, 181)";>
                        <div class="card-body p-4 p-md-5 d-flex flex-column">
                            <h3 class="text-center mb-4 fw-bold pb-3 border-bottom text-dark">Login</h3>
                            <form id="loginForm" class="needs-validation" novalidate>
                                <div class="mb-4">
                                    <input type="text" class="form-control form-control-lg rounded-pill px-4" id="loginUser" placeholder="User ID" required>
                                    <div class="invalid-feedback ps-3">Please enter your User ID.</div>
                                </div>
                                <div class="mb-5">
                                    <input type="password" class="form-control form-control-lg rounded-pill px-4" id="loginPwd" placeholder="Password" required>
                                    <div class="invalid-feedback ps-3">Please enter your password.</div>
                                </div>
                                <button type="submit" class="btn btn-dark w-100 btn-lg rounded-pill fw-bold mt-auto shadow-sm transition-all">Login</button>
                            </form>
                        </div>
                    </div>
                </div>

                
                <div class="col-md-6 col-lg-5">
                    <div class="card shadow-sm border border-light-subtle rounded-4 h-100 " style="background-color: rgb(132, 205, 181)";>
                        <div class="card-body p-4 p-md-5 d-flex flex-column">
                            <h3 class="text-center mb-4 fw-bold pb-3 border-bottom text-dark">Register</h3>
                            <form id="registerForm" class="needs-validation" novalidate>
                                <div class="mb-4">
                                    <input type="text" class="form-control form-control-lg rounded-pill px-4" id="regUser" placeholder="User ID" required>
                                    <div class="invalid-feedback ps-3">Please choose a User ID.</div>
                                </div>
                                <div class="mb-4">
                                    <input type="password" class="form-control form-control-lg rounded-pill px-4" id="regPwd" placeholder="Password" required minlength="6">
                                    <div class="invalid-feedback ps-3">Password must be at least 6 characters.</div>
                                </div>
                                <div class="mb-5">
                                    <input type="text" class="form-control form-control-lg rounded-pill px-4" id="regName" placeholder="Your Name" required>
                                    <div class="invalid-feedback ps-3">Please enter your name.</div>
                                </div>
                                <button type="submit" class="btn btn-dark w-100 btn-lg rounded-pill fw-bold mt-auto shadow-sm transition-all">Register</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

   
    <footer class="py-3 mt-auto border-top " >
        <div class="container text-center ">
            <small class="fw-medium text-light ">Created By Thanushya Jeyasuthan © 2026. All rights reserved.</small>
        </div>
    </footer>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    

    <script src="js/main.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
